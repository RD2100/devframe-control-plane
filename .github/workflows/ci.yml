name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pyyaml pytest
      - run: pip install -e .
      - run: python -m pytest tests/ -v --tb=short
      - run: python -m control_plane.cli doctor || true
