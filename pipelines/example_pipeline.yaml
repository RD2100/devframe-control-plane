pipeline_id: example_pipeline
version: 1
description: "Example pipeline for testing runner skeleton"

global_invariants:
  guard_removal_approved: false
  evidence_cleanup_approved: false

stages:
  - id: g0_bootstrap
    type: bootstrap
    description: "Project initialization"
    requires_gpt_acceptance: false

  - id: g1_planning
    type: planning
    description: "Design phase"
    depends_on: g0_bootstrap
    requires_gpt_acceptance: false

  - id: g2_authorization
    type: authorization
    description: "Request GPT authorization"
    depends_on: g1_planning
    requires_gpt_acceptance: true
    evidence_spec:
      required_files:
        - GPT_REVIEW_PROMPT.md
        - SAFETY_CHECK.md

  - id: g2_closure
    type: execution_closure
    description: "Submit execution evidence"
    depends_on: g2_authorization
    requires_gpt_acceptance: true
    evidence_spec:
      required_files:
        - UNIFIED_DIFF.patch
        - TEST_OUTPUT.txt

recovery_policy:
  max_retries_per_stage: 3
  cooldown_seconds: 30
  on_exhausted: human_required
